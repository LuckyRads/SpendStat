spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spendstat}
    username: ${DB_USERNAME:spendstat}
    password: ${DB_PASSWORD:spendstat}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-minutes: ${JWT_EXPIRY_MINUTES:15}
  refresh-token:
    expiry-days: ${REFRESH_TOKEN_EXPIRY_DAYS:30}
