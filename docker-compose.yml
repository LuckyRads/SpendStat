services:
  db:
    image: postgres:16-alpine
    container_name: spendstat-db
    environment:
      POSTGRES_DB: spendstat
      POSTGRES_USER: spendstat
      POSTGRES_PASSWORD: spendstat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spendstat-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@spendstat.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
